services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lusiyuan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lusiyuan
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lusiyuan_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
